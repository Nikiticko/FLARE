name: Deploy FLARE

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 15m
          script: |
            set -e

            echo "🚀 START DEPLOY"

            cd /var/www/shkila
            git fetch origin
            git reset --hard origin/main

            source venv/bin/activate
            cd back/school

            pip install -r ../../requirements.txt
            python manage.py migrate
            python manage.py collectstatic --noinput

            cp /var/www/shkila/deploy/systemd/shkila-payment-sync.service /etc/systemd/system/
            cp /var/www/shkila/deploy/systemd/shkila-payment-sync.timer /etc/systemd/system/
            systemctl daemon-reload
            systemctl enable --now shkila-payment-sync.timer

            systemctl restart shkila

            cd /var/www/shkila/front
            npm install
            npm run build

            rm -rf /var/www/frontend/*
            cp -r dist/* /var/www/frontend/

            chown -R www-data:www-data /var/www/frontend
            chmod -R 755 /var/www/frontend

            systemctl reload nginx

            echo "✅ DEPLOY FINISHED"
